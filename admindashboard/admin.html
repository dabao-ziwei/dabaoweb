    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大寶 - 專屬管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<body class="bg-gray-100 h-screen flex overflow-hidden">

    <script>
        const isLoggedIn = sessionStorage.getItem('isAdminLoggedIn');
        if (!isLoggedIn) {
            alert('未經授權的訪問，請先透過正確入口驗證！');
            window.location.href = '/'; 
        }
        
        // 【重要：網站檔案抓取清單】供 AI 提示詞產生器使用
        window.filesToFetch = [
            '/index.html',
            '/chart.html',
            '/booking.html',
            '/course.html',
            '/articles.html',
            '/new_articles.html',
            '/article_view.html',
            '/admindashboard/admin.html',

            '/admindashboard/js/admin-feedback.js',
            '/admindashboard/js/admin-article.js'
        ];
    </script>

    <aside class="w-64 bg-gray-800 text-white flex flex-col z-20">
        <div class="p-6 text-2xl font-bold border-b border-gray-700 tracking-wider">管理後台</div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto" id="sidebar-nav">
            <button data-tab="overview" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 bg-gray-700 text-white font-medium">首頁總覽</button>
            <button data-tab="ai" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">AI 提示詞產生</button>
            <button data-tab="announcement" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">公告管理</button>
            <button data-tab="feedback" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">客戶回饋管理</button>
            <button data-tab="article" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">文章管理</button>
            <button data-tab="password" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">變更密碼</button>
            <div class="pt-2 mt-2 border-t border-gray-700">
                <a href="/" target="_blank" class="w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-teal-400 hover:text-teal-300 font-medium flex items-center justify-between">
                    <span>開啟網站</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                </a>
            </div>
        </nav>
        <div class="p-4 border-t border-gray-700">
            <button id="btn-logout" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded transition duration-200">登出系統</button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow p-4 flex items-center justify-between z-10">
            <h1 class="text-xl font-semibold text-gray-800" id="header-title">首頁總覽</h1>
        </header>

        <main class="flex-1 p-6 overflow-y-auto relative bg-gray-50">
            
            <div id="tab-overview" class="content-tab bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">總覽看板</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-blue-50 p-6 rounded-lg border border-blue-100">
                        <h3 class="text-blue-800 text-lg font-bold mb-2">已發布文章</h3>
                        <p class="text-4xl font-black text-blue-600" id="stat-published">0</p>
                    </div>
                    <div class="bg-purple-50 p-6 rounded-lg border border-purple-100">
                        <h3 class="text-purple-800 text-lg font-bold mb-2">文章總瀏覽量</h3>
                        <p class="text-4xl font-black text-purple-600" id="stat-views">0</p>
                    </div>
                    <div class="bg-orange-50 p-6 rounded-lg border border-orange-100">
                        <h3 class="text-orange-800 text-lg font-bold mb-2">草稿數量</h3>
                        <p class="text-4xl font-black text-orange-600" id="stat-drafts">0</p>
                    </div>
                </div>
            </div>

            <div id="tab-ai" class="content-tab hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">🤖 AI 提示詞產生器 (完美防呆版)</h2>
                <p class="text-gray-600 mb-6">點擊下方按鈕，系統會自動抓取「資料庫結構」與「所有網頁原始碼」，並附上嚴格的防呆指令。一鍵複製後即可直接貼給 AI，確保 AI 會自動幫你維護未來的檔案清單。</p>
                <button id="btn-fetch-ai" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg mb-6 transition duration-200">🪄 抓取並產生終極提示詞</button>
                <div class="relative">
                    <textarea id="ai-prompt-result" class="w-full h-96 p-4 border border-gray-300 rounded-lg bg-gray-50 text-gray-800 font-mono text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" readonly placeholder="產生的終極提示詞會顯示在這裡..."></textarea>
                    <button id="btn-copy-ai" class="hidden absolute top-4 right-4 bg-green-500 hover:bg-green-600 text-white font-bold py-1 px-4 rounded shadow transition duration-200">複製全部內容</button>
                </div>
            </div>

            <div id="tab-announcement" class="content-tab hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">📢 公告管理</h2>
                <div class="max-w-3xl bg-gray-50 p-6 rounded-lg border border-gray-200">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="announcement-input">目前公告內容</label>
                        <textarea class="shadow appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 h-24" id="announcement-input" placeholder="正在讀取資料庫中的公告..."></textarea>
                    </div>
                    <button id="btn-save-announcement" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded focus:outline-none focus:shadow-outline transition duration-200">發布更新</button>
                </div>
            </div>

            <div id="tab-feedback" class="content-tab hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">💬 客戶回饋管理</h2>
                <div class="bg-gray-50 p-6 rounded-lg border border-gray-200 mb-8">
                    <div class="flex items-center gap-4">
                        <input type="file" id="feedback-file-input" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                        <button id="btn-upload-feedback" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded focus:outline-none focus:shadow-outline transition duration-200 whitespace-nowrap">上傳圖片</button>
                    </div>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">已上傳的圖片清單</h3>
                <div id="feedback-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                    <p class="text-gray-500 col-span-full">載入中...</p>
                </div>
            </div>

            <div id="tab-article" class="content-tab hidden w-full">
                <div id="article-list-view" class="bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <div class="flex items-center gap-4">
                            <h2 class="text-2xl font-bold text-gray-800">📝 文章管理</h2>
                            
                            <div class="flex items-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 shadow-sm">
                                <label class="inline-flex items-center cursor-pointer mr-3">
                                    <input type="checkbox" id="toggle-new-list" class="sr-only peer">
                                    <div class="relative w-11 h-6 bg-gray-300 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                                    <span class="ml-3 text-sm font-medium text-gray-700">啟用新版前台</span>
                                </label>
                                <button id="btn-preview-new-list" class="text-sm text-blue-600 hover:text-blue-800 font-medium border-l pl-3 border-gray-300">👀 預覽新版</button>
                            </div>

                        </div>
                        <button id="btn-create-article" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow transition duration-200 whitespace-nowrap">+ 撰寫新文章</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full bg-white border border-gray-200 rounded-lg hidden" id="article-table">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="py-3 px-4 border-b text-left text-sm font-semibold text-gray-600">文章標題</th>
                                    <th class="py-3 px-4 border-b text-left text-sm font-semibold text-gray-600 w-32">狀態</th>
                                    <th class="py-3 px-4 border-b text-left text-sm font-semibold text-gray-600 w-24">瀏覽</th>
                                    <th class="py-3 px-4 border-b text-left text-sm font-semibold text-gray-600 w-40">建立時間</th>
                                    <th class="py-3 px-4 border-b text-center text-sm font-semibold text-gray-600 w-32">操作</th>
                                </tr>
                            </thead>
                            <tbody id="article-list-body"></tbody>
                        </table>
                        <div id="article-empty-state" class="text-center py-10 text-gray-500">
                            目前還沒有文章，點擊右上角按鈕開始撰寫吧！
                        </div>
                    </div>
                </div>

                <div id="article-edit-view" class="hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100 max-w-5xl mx-auto">
                    <div class="flex justify-between items-center mb-6 border-b pb-4">
                        <h2 class="text-2xl font-bold text-gray-800" id="edit-view-title">撰寫新文章</h2>
                        <div class="flex gap-3">
                            <button id="btn-cancel-article" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 px-4 rounded transition duration-200">返回</button>
                            <button id="btn-save-draft" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded shadow transition duration-200">存為草稿</button>
                            <button id="btn-publish-article" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow transition duration-200">正式發布</button>
                        </div>
                    </div>
                    
                    <input type="hidden" id="current-article-id" value="0">
                    <input type="text" id="article-title-input" placeholder="請輸入文章標題..." class="w-full text-3xl font-bold p-2 mb-4 border-b-2 border-transparent hover:border-gray-200 focus:border-blue-500 focus:outline-none transition-colors" autocomplete="off">
                    
                    <div class="mb-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
                        <label class="block text-gray-700 text-sm font-bold mb-2">🏷️ 文章分類標籤 (可多選)</label>
                        <div id="tags-container" class="flex flex-wrap gap-2 mb-2 min-h-[28px]"></div>
                        <input type="text" id="tag-input" placeholder="輸入標籤後按下 Enter 鍵加入 (例如：十四主星)" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div id="quill-editor-wrapper" class="mb-2">
                        <div id="quill-editor"></div>
                    </div>
                    
                    <div class="flex justify-between text-gray-500 text-sm mb-8 px-2 font-medium">
                        <span>總字元數：<span id="word-count-display" class="text-blue-600">0</span> 字</span>
                        <span>預估閱讀時間：約 <span id="read-time-display" class="text-blue-600">0</span> 分鐘</span>
                    </div>

                    <div class="bg-gray-50 p-6 rounded-lg border border-gray-200 mb-6">
                        <div class="flex justify-between items-center mb-4 border-b border-gray-200 pb-2">
                            <h3 class="text-lg font-bold text-gray-800">🔍 SEO 與專屬網址設定</h3>
                            <button id="btn-ai-seo" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-1 px-4 rounded text-sm shadow transition duration-200 flex items-center gap-1">
                                ✨ 讓 AI 幫我產生
                            </button>
                        </div>
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="block text-gray-700 text-sm font-bold mb-1">自訂網址 (Slug) <span class="text-xs font-normal text-gray-500">- 建議使用小寫英文與橫槓</span></label>
                                <input type="text" id="article-slug" placeholder="例如：ziwei-dou-shu-basic" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-purple-500">
                            </div>
                            <div>
                                <label class="block text-gray-700 text-sm font-bold mb-1">SEO 標題 (Meta Title)</label>
                                <input type="text" id="article-meta-title" placeholder="顯示在搜尋引擎上的吸睛標題" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-purple-500">
                            </div>
                            <div>
                                <label class="block text-gray-700 text-sm font-bold mb-1">SEO 描述摘要 (Meta Description)</label>
                                <textarea id="article-meta-desc" placeholder="約 100 字的文章精華摘要，吸引讀者點擊" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-purple-500 h-20"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-password" class="content-tab hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">🔒 變更密碼</h2>
                <div class="max-w-md bg-gray-50 p-6 rounded-lg border border-gray-200">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="old-password">目前舊密碼</label>
                        <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" id="old-password" type="password" placeholder="請輸入舊密碼">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="new-password">新密碼</label>
                        <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" id="new-password" type="password" placeholder="請輸入新密碼">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="confirm-password">再次確認新密碼</label>
                        <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" id="confirm-password" type="password" placeholder="請再次輸入新密碼">
                    </div>
                    <button id="btn-change-password" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-200">儲存新密碼</button>
                </div>
            </div>

        </main>
    </div>

    <script src="./js/admin-main.js"></script>
    <script src="./js/admin-feedback.js"></script>
    <script src="./js/admin-article.js"></script>
</body>
</html>
