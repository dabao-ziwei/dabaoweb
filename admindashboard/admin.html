                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-gray-400 text-sm font-bold mb-1">自訂網址 (Slug)</label>
                        <input type="text" id="article-slug" class="w-full bg-[#111] border border-gray-700 rounded-lg py-2.5 px-3 text-gray-200 focus:outline-none focus:border-purple-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-sm font-bold mb-1">SEO 標題 (Meta Title)</label>
                        <input type="text" id="article-meta-title" class="w-full bg-[#111] border border-gray-700 rounded-lg py-2.5 px-3 text-gray-200 focus:outline-none focus:border-purple-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-sm font-bold mb-1">SEO 描述摘要 (Meta Description)</label>
                        <textarea id="article-meta-desc" class="w-full bg-[#111] border border-gray-700 rounded-lg py-2.5 px-3 text-gray-200 focus:outline-none focus:border-purple-500 transition-colors h-24 resize-none"></textarea>
                    </div>
                </div>
            </div>
            
            <div class="flex justify-end gap-4 pt-4">
                <button id="btn-cancel-publish" class="px-6 py-2.5 rounded-lg font-medium text-gray-400 hover:text-white hover:bg-gray-800 transition-colors">返回寫作</button>
                <button id="btn-save-draft" class="px-6 py-2.5 rounded-lg font-bold bg-gray-700 hover:bg-gray-600 text-white transition-colors shadow-sm">存為草稿</button>
                <button id="btn-publish-article" class="px-8 py-2.5 rounded-lg font-bold bg-red-500 hover:bg-red-600 text-white shadow-lg transition-colors">正式發布</button>
            </div>
        </div>
    </div>

    <script src="./js/admin-main.js"></script>
    <script src="./js/admin-feedback.js"></script>
    <script src="./js/admin-article.js"></script>
</body>
</html>
