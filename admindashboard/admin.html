<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大寶 - 專屬管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

    <script>
        const isLoggedIn = sessionStorage.getItem('isAdminLoggedIn');
        if (!isLoggedIn) {
            alert('未經授權的訪問，請先透過正確入口驗證！');
            window.location.href = '/'; 
        }
    </script>

    <aside class="w-64 bg-gray-800 text-white flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-gray-700 tracking-wider">
            管理後台
        </div>
        
        <nav class="flex-1 p-4 space-y-2" id="sidebar-nav">
            <button data-tab="overview" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 bg-gray-700 text-white font-medium">首頁總覽</button>
            <button data-tab="ai" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">AI 提示詞產生</button>
            <button data-tab="announcement" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">公告管理</button>
            <button data-tab="article" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">文章管理</button>
            <button data-tab="password" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">變更密碼</button>
        </nav>
        
        <div class="p-4 border-t border-gray-700">
            <button id="btn-logout" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded transition duration-200">
                登出系統
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col">
        <header class="bg-white shadow p-4 flex items-center justify-between">
            <h1 class="text-xl font-semibold text-gray-800" id="header-title">首頁總覽</h1>
        </header>

        <main class="flex-1 p-6 overflow-y-auto relative">
            
            <div id="tab-overview" class="content-tab bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">系統狀態：正常</h2>
                <p class="text-gray-600 leading-relaxed text-lg">
                    歡迎進入專屬管理後台。<br><br>
                    請點擊左側選單來切換您需要使用的管理功能。
                </p>
            </div>

            <div id="tab-ai" class="content-tab hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">🤖 AI 提示詞產生器 (完全體)</h2>
                <p class="text-gray-600 mb-6">點擊下方按鈕，系統會自動抓取「資料庫結構」與「最新網頁原始碼」，組合成最完整的 AI 提示詞。一鍵複製後即可直接貼給 AI 進行開發討論。</p>
                
                <button id="btn-fetch-ai" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg mb-6 transition duration-200">
                    🪄 抓取並產生完整提示詞
                </button>
                
                <div class="relative">
                    <textarea id="ai-prompt-result" class="w-full h-96 p-4 border border-gray-300 rounded-lg bg-gray-50 text-gray-800 font-mono text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" readonly placeholder="產生的完整提示詞會顯示在這裡..."></textarea>
                    
                    <button id="btn-copy-ai" class="hidden absolute top-4 right-4 bg-green-500 hover:bg-green-600 text-white font-bold py-1 px-4 rounded shadow transition duration-200">
                        複製全部內容
                    </button>
                </div>
            </div>

            <div id="tab-announcement" class="content-tab hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">📢 公告管理</h2>
                <p class="text-gray-600">這個功能正在建置中，敬請期待...</p>
            </div>

            <div id="tab-article" class="content-tab hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">📝 文章管理</h2>
                <p class="text-gray-600">這個功能正在建置中，敬請期待...</p>
            </div>

            <div id="tab-password" class="content-tab hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">🔒 變更密碼</h2>
                <p class="text-gray-600">這個功能正在建置中，敬請期待...</p>
            </div>

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. 初始化 Supabase
            const supabaseUrl = 'https://uwktzlxlduqyjyoolgrs.supabase.co';
            const supabaseKey = 'sb_publishable_zd-hddZrWPl2uzLUJmouxw_U31_3PYa';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            // 2. 左側選單切換邏輯
            const tabTitles = {
                'overview': '首頁總覽',
                'ai': 'AI 提示詞產生',
                'announcement': '公告管理',
                'article': '文章管理',
                'password': '變更密碼'
            };

            const navBtns = document.querySelectorAll('.nav-btn');
            const contentTabs = document.querySelectorAll('.content-tab');
            const headerTitle = document.getElementById('header-title');

            navBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetTab = btn.getAttribute('data-tab');
                    contentTabs.forEach(tab => tab.classList.add('hidden'));
                    document.getElementById('tab-' + targetTab).classList.remove('hidden');
                    headerTitle.innerText = tabTitles[targetTab];

                    navBtns.forEach(b => {
                        b.classList.remove('bg-gray-700', 'text-white', 'font-medium');
                        b.classList.add('text-gray-300', 'hover:text-white');
                    });
                    btn.classList.remove('text-gray-300', 'hover:text-white');
                    btn.classList.add('bg-gray-700', 'text-white', 'font-medium');
                });
            });

            // 3. AI 提示詞產生器 (完全體邏輯)
            const btnFetchAi = document.getElementById('btn-fetch-ai');
            const textAreaResult = document.getElementById('ai-prompt-result');
            const btnCopyAi = document.getElementById('btn-copy-ai');

            btnFetchAi.addEventListener('click', async () => {
                btnFetchAi.innerText = '⏳ 抓取資料庫與網頁原始碼中...';
                textAreaResult.value = '正在搜集所有必要的資訊，請稍候...\n這可能需要幾秒鐘的時間。';
                btnCopyAi.classList.add('hidden');

                let finalPrompt = '';

                try {
                    // 第一步：抓取資料庫結構與示範資料
                    const { data: dbData, error: dbError } = await supabase.rpc('get_db_schema_for_ai');
                    if (dbError) throw new Error('資料庫抓取失敗：' + dbError.message);
                    
                    finalPrompt += dbData + '\n\n';
                    finalPrompt += '========================================\n';
                    finalPrompt += '以下是我目前網站的相關原始碼，請以此為基礎進行修改或新增功能：\n\n';

                    // 第二步：去檔案室抓取首頁 (index.html) 的原始碼
                    try {
                        const indexResponse = await fetch('/index.html');
                        if (indexResponse.ok) {
                            const indexHtml = await indexResponse.text();
                            finalPrompt += '【首頁原始碼：/index.html】\n```html\n' + indexHtml + '\n```\n\n';
                        } else {
                            finalPrompt += '【首頁原始碼：/index.html】\n(無法讀取首頁檔案)\n\n';
                        }
                    } catch (err) {
                        finalPrompt += '【首頁原始碼：/index.html】\n(讀取發生錯誤)\n\n';
                    }

                    // 第三步：去檔案室抓取後台 (admin.html) 的原始碼
                    try {
                        const adminResponse = await fetch('/admindashboard/admin.html');
                        if (adminResponse.ok) {
                            const adminHtml = await adminResponse.text();
                            finalPrompt += '【後台原始碼：/admindashboard/admin.html】\n```html\n' + adminHtml + '\n```\n';
                        } else {
                            finalPrompt += '【後台原始碼：/admindashboard/admin.html】\n(無法讀取後台檔案)\n';
                        }
                    } catch (err) {
                        finalPrompt += '【後台原始碼：/admindashboard/admin.html】\n(讀取發生錯誤)\n';
                    }

                    // 將組裝好的終極提示詞顯示在畫面上
                    textAreaResult.value = finalPrompt;
                    btnCopyAi.classList.remove('hidden');

                } catch (err) {
                    console.error(err);
                    textAreaResult.value = err.message;
                } finally {
                    btnFetchAi.innerText = '🪄 抓取並產生完整提示詞';
                }
            });

            // 4. 一鍵複製按鈕邏輯
            btnCopyAi.addEventListener('click', () => {
                textAreaResult.select();
                document.execCommand('copy');
                
                const originalText = btnCopyAi.innerText;
                btnCopyAi.innerText = '✅ 已全部複製！';
                btnCopyAi.classList.replace('bg-green-500', 'bg-teal-600');
                
                setTimeout(() => {
                    btnCopyAi.innerText = originalText;
                    btnCopyAi.classList.replace('bg-teal-600', 'bg-green-500');
                }, 2000);
            });

            // 5. 登出功能
            const btnLogout = document.getElementById('btn-logout');
            btnLogout.addEventListener('click', () => {
                sessionStorage.removeItem('isAdminLoggedIn');
                alert('已成功登出系統。');
                window.location.href = '/'; 
            });
        });
    </script>
</body>
</html>
