<!DOCTYPE html>
<html lang="zh-TW">
<head><script>window.__sb_state = {};</script><script src="/.webcontainer@runtime.8669d46c.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大寶 - 專屬管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

    <script>
        const isLoggedIn = sessionStorage.getItem('isAdminLoggedIn');
        if (!isLoggedIn) {
            alert('未經授權的訪問，請先透過正確入口驗證！');
            window.location.href = '/'; 
        }
    </script>

    <aside class="w-64 bg-gray-800 text-white flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-gray-700 tracking-wider">
            管理後台
        </div>
        
        <nav class="flex-1 p-4 space-y-2" id="sidebar-nav">
            <button data-tab="overview" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 bg-gray-700 text-white font-medium">首頁總覽</button>
            <button data-tab="ai" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">AI 提示詞產生</button>
            <button data-tab="announcement" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">公告管理</button>
            <button data-tab="article" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">文章管理</button>
            <button data-tab="password" class="nav-btn w-full text-left block py-3 px-4 rounded transition duration-200 hover:bg-gray-700 text-gray-300 hover:text-white">變更密碼</button>
        </nav>
        
        <div class="p-4 border-t border-gray-700">
            <button id="btn-logout" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded transition duration-200">
                登出系統
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col">
        <header class="bg-white shadow p-4 flex items-center justify-between">
            <h1 class="text-xl font-semibold text-gray-800" id="header-title">首頁總覽</h1>
        </header>

        <main class="flex-1 p-6 overflow-y-auto relative">
            
            <div id="tab-overview" class="content-tab bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">系統狀態：正常</h2>
                <p class="text-gray-600 leading-relaxed text-lg">
                    歡迎進入專屬管理後台。<br><br>
                    請點擊左側選單來切換您需要使用的管理功能。
                </p>
            </div>

            <div id="tab-ai" class="content-tab hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">🤖 AI 提示詞產生器 (完美防呆版)</h2>
                <p class="text-gray-600 mb-6">點擊下方按鈕，系統會自動抓取「資料庫結構」與「所有網頁原始碼」，並附上嚴格的防呆指令。一鍵複製後即可直接貼給 AI，確保 AI 會自動幫你維護未來的檔案清單。</p>
                
                <button id="btn-fetch-ai" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg mb-6 transition duration-200">
                    🪄 抓取並產生終極提示詞
                </button>
                
                <div class="relative">
                    <textarea id="ai-prompt-result" class="w-full h-96 p-4 border border-gray-300 rounded-lg bg-gray-50 text-gray-800 font-mono text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" readonly placeholder="產生的終極提示詞會顯示在這裡..."></textarea>
                    
                    <button id="btn-copy-ai" class="hidden absolute top-4 right-4 bg-green-500 hover:bg-green-600 text-white font-bold py-1 px-4 rounded shadow transition duration-200">
                        複製全部內容
                    </button>
                </div>
            </div>

            <div id="tab-announcement" class="content-tab hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">📢 公告管理</h2>
                <p class="text-gray-600 mb-6">請在下方修改網站頂部的最新公告內容。為了保持手機版與電腦版的最佳視覺效果，建議以單行重點文字為主，避免過長。</p>
                
                <div class="max-w-3xl bg-gray-50 p-6 rounded-lg border border-gray-200">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="announcement-input">目前公告內容</label>
                        <textarea class="shadow appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 h-24" id="announcement-input" placeholder="正在讀取資料庫中的公告..."></textarea>
                    </div>
                    
                    <button id="btn-save-announcement" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded focus:outline-none focus:shadow-outline transition duration-200">
                        發布更新
                    </button>
                </div>
            </div>

            <div id="tab-article" class="content-tab hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">📝 文章管理</h2>
                <p class="text-gray-600">這個功能正在建置中，敬請期待...</p>
            </div>

            <div id="tab-password" class="content-tab hidden bg-white p-8 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">🔒 變更密碼</h2>
                <p class="text-gray-600 mb-6">為確保安全，變更密碼前需驗證目前的舊密碼。</p>
                
                <div class="max-w-md bg-gray-50 p-6 rounded-lg border border-gray-200">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="old-password">目前舊密碼</label>
                        <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" id="old-password" type="password" placeholder="請輸入舊密碼">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="new-password">新密碼</label>
                        <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" id="new-password" type="password" placeholder="請輸入新密碼">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="confirm-password">再次確認新密碼</label>
                        <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" id="confirm-password" type="password" placeholder="請再次輸入新密碼">
                    </div>
                    <button id="btn-change-password" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-200">
                        儲存新密碼
                    </button>
                </div>
            </div>

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. 初始化 Supabase
            const supabaseUrl = 'https://uwktzlxlduqyjyoolgrs.supabase.co';
            const supabaseKey = 'sb_publishable_zd-hddZrWPl2uzLUJmouxw_U31_3PYa';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            // 2. 左側選單切換邏輯
            const tabTitles = {
                'overview': '首頁總覽',
                'ai': 'AI 提示詞產生',
                'announcement': '公告管理',
                'article': '文章管理',
                'password': '變更密碼'
            };

            const navBtns = document.querySelectorAll('.nav-btn');
            const contentTabs = document.querySelectorAll('.content-tab');
            const headerTitle = document.getElementById('header-title');

            navBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetTab = btn.getAttribute('data-tab');
                    contentTabs.forEach(tab => tab.classList.add('hidden'));
                    document.getElementById('tab-' + targetTab).classList.remove('hidden');
                    headerTitle.innerText = tabTitles[targetTab];

                    navBtns.forEach(b => {
                        b.classList.remove('bg-gray-700', 'text-white', 'font-medium');
                        b.classList.add('text-gray-300', 'hover:text-white');
                    });
                    btn.classList.remove('text-gray-300', 'hover:text-white');
                    btn.classList.add('bg-gray-700', 'text-white', 'font-medium');
                });
            });

            // 3. AI 提示詞產生器 (完美防呆版邏輯)
            const btnFetchAi = document.getElementById('btn-fetch-ai');
            const textAreaResult = document.getElementById('ai-prompt-result');
            const btnCopyAi = document.getElementById('btn-copy-ai');

            // 【重要：網站檔案抓取清單】
            const filesToFetch = [
                '/index.html',
                '/chart.html',
                '/booking.html',
                '/course.html',
                '/articles.html',
                '/admindashboard/admin.html'
            ];

            btnFetchAi.addEventListener('click', async () => {
                btnFetchAi.innerText = '⏳ 抓取所有資料中...';
                textAreaResult.value = '正在搜集資料庫與所有網頁檔案，請稍候...\n檔案越多會需要幾秒鐘的時間。';
                btnCopyAi.classList.add('hidden');

                let finalPrompt = '【⚠️ 給 AI 的嚴格開發規範（非常重要）】\n';
                finalPrompt += '1. 每次你提供修改後的 `/admindashboard/admin.html` 原始碼時，必須確保 `filesToFetch` 這個陣列包含網站「所有的」網頁檔案。\n';
                finalPrompt += '2. 如果你在對話中幫我「新增」了任何新的網頁檔案，你【必須主動】在修改 `/admindashboard/admin.html` 時，將新檔案的路徑加入到 `filesToFetch` 陣列中。\n';
                finalPrompt += '3. 絕對不可以叫我手動去新增陣列！這非常容易出錯，請你全權負責陣列清單的維護。\n\n';
                finalPrompt += '========================================\n\n';

                try {
                    const { data: dbData, error: dbError } = await supabase.rpc('get_db_schema_for_ai');
                    if (dbError) throw new Error('資料庫抓取失敗：' + dbError.message);
                    
                    finalPrompt += dbData + '\n';
                    finalPrompt += '========================================\n';
                    finalPrompt += '以下是我目前網站所有頁面的完整原始碼，請以此為基礎進行修改或新增功能：\n\n';

                    for (const file of filesToFetch) {
                        try {
                            const response = await fetch(file);
                            if (response.ok) {
                                const code = await response.text();
                                finalPrompt += `【檔案路徑：${file}】\n\`\`\`html\n${code}\n\`\`\`\n\n`;
                            } else {
                                finalPrompt += `【檔案路徑：${file}】\n(目前尚未建立此檔案或無法讀取)\n\n`;
                            }
                        } catch (err) {
                            finalPrompt += `【檔案路徑：${file}】\n(讀取發生錯誤)\n\n`;
                        }
                    }

                    textAreaResult.value = finalPrompt;
                    btnCopyAi.classList.remove('hidden');

                } catch (err) {
                    console.error(err);
                    textAreaResult.value = err.message;
                } finally {
                    btnFetchAi.innerText = '🪄 抓取並產生終極提示詞';
                }
            });

            btnCopyAi.addEventListener('click', () => {
                textAreaResult.select();
                document.execCommand('copy');
                
                const originalText = btnCopyAi.innerText;
                btnCopyAi.innerText = '✅ 已全部複製！';
                btnCopyAi.classList.replace('bg-green-500', 'bg-teal-600');
                
                setTimeout(() => {
                    btnCopyAi.innerText = originalText;
                    btnCopyAi.classList.replace('bg-teal-600', 'bg-green-500');
                }, 2000);
            });

            // 4. 公告管理邏輯
            const announcementInput = document.getElementById('announcement-input');
            const btnSaveAnnouncement = document.getElementById('btn-save-announcement');
            const tabAnnouncementBtn = document.querySelector('[data-tab="announcement"]');

            // 點擊公告標籤時，自動從資料庫抓取最新公告顯示在輸入框
            tabAnnouncementBtn.addEventListener('click', async () => {
                announcementInput.value = '正在讀取最新公告...';
                try {
                    const { data, error } = await supabase.from('announcements').select('content').eq('id', 1).single();
                    if (error) throw error;
                    if (data) {
                        announcementInput.value = data.content;
                    }
                } catch (err) {
                    console.error('讀取公告失敗：', err);
                    announcementInput.value = '讀取失敗，請確認資料庫連線或重新整理頁面。';
                }
            });

            // 點擊儲存公告按鈕
            btnSaveAnnouncement.addEventListener('click', async () => {
                const newContent = announcementInput.value.trim();
                if (!newContent) return alert('⚠️ 公告內容不能為空白！');

                btnSaveAnnouncement.innerText = '發布中...';
                btnSaveAnnouncement.disabled = true;

                try {
                    // 呼叫我們剛剛在資料庫建立的專屬保鑣 (update_announcement)
                    const { data, error } = await supabase.rpc('update_announcement', {
                        new_content: newContent
                    });

                    if (error) throw error;

                    alert('✅ 公告已成功更新！您可以回首頁查看最新變化。');
                } catch (err) {
                    console.error(err);
                    alert('⚠️ 發生錯誤：' + err.message);
                } finally {
                    btnSaveAnnouncement.innerText = '發布更新';
                    btnSaveAnnouncement.disabled = false;
                }
            });

            // 5. 變更密碼邏輯
            const btnChangePassword = document.getElementById('btn-change-password');
            const oldPasswordInput = document.getElementById('old-password');
            const newPasswordInput = document.getElementById('new-password');
            const confirmPasswordInput = document.getElementById('confirm-password');

            btnChangePassword.addEventListener('click', async () => {
                const oldPass = oldPasswordInput.value.trim();
                const newPass = newPasswordInput.value.trim();
                const confirmPass = confirmPasswordInput.value.trim();

                if (!oldPass || !newPass || !confirmPass) {
                    return alert('⚠️ 請將三個密碼欄位都填寫完整！');
                }
                if (newPass !== confirmPass) {
                    return alert('⚠️ 兩次輸入的新密碼不一致，請重新確認！');
                }
                if (oldPass === newPass) {
                    return alert('⚠️ 新密碼不能跟舊密碼一樣！');
                }

                btnChangePassword.innerText = '更新中...';
                btnChangePassword.disabled = true;

                try {
                    const { data, error } = await supabase.rpc('change_admin_password', {
                        input_old_pass: oldPass,
                        input_new_pass: newPass
                    });

                    if (error) throw error;

                    if (data === true) {
                        alert('✅ 密碼變更成功！請妥善保管您的新密碼。');
                        oldPasswordInput.value = '';
                        newPasswordInput.value = '';
                        confirmPasswordInput.value = '';
                    } else {
                        alert('❌ 舊密碼輸入錯誤，變更失敗！');
                    }
                } catch (err) {
                    console.error(err);
                    alert('⚠️ 發生錯誤：' + err.message);
                } finally {
                    btnChangePassword.innerText = '儲存新密碼';
                    btnChangePassword.disabled = false;
                }
            });

            // 6. 登出功能
            const btnLogout = document.getElementById('btn-logout');
            btnLogout.addEventListener('click', () => {
                sessionStorage.removeItem('isAdminLoggedIn');
                alert('已成功登出系統。');
                window.location.href = '/'; 
            });
        });
    </script>
</body>
</html>
