<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章內容 - 大寶的紫微斗數</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        /* 修正 Quill 產生的內容在前台的預設樣式 */
        .ql-editor { padding: 0; overflow-y: visible; }
        .ql-editor h1 { font-size: 2em; font-weight: bold; margin-bottom: 0.5em; }
        .ql-editor h2 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; mt-4; }
        .ql-editor p { margin-bottom: 1em; line-height: 1.8; }
        .ql-editor img { max-width: 100%; border-radius: 8px; margin: 1em 0; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-white shadow-sm p-4 mb-8">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">大寶的命理空間</h1>
            <button onclick="window.history.back()" class="text-blue-600 hover:underline">返回列表</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 bg-white rounded-lg shadow-sm min-h-screen">
        <div id="loading" class="text-center text-gray-500 py-20">正在載入文章內容...</div>
        
        <article id="article-container" class="hidden">
            <header class="mb-8 border-b pb-6">
                <h1 id="view-title" class="text-3xl md:text-4xl font-bold mb-4"></h1>
                <div class="flex flex-wrap gap-4 text-sm text-gray-500 mb-4">
                    <span id="view-date">📅 --</span>
                    <span id="view-read-time">⏱️ -- 分鐘閱讀</span>
                    <span id="view-views">👁️ -- 次觀看</span>
                </div>
                <div id="view-tags" class="flex flex-wrap gap-2"></div>
            </header>
            
            <div id="view-content" class="ql-editor text-lg"></div>
        </article>
    </main>

    <script>
        const supabaseUrl = 'https://uwktzlxlduqyjyoolgrs.supabase.co';
        const supabaseKey = 'sb_publishable_zd-hddZrWPl2uzLUJmouxw_U31_3PYa';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const articleId = params.get('id');
            
            if (!articleId) {
                document.getElementById('loading').innerText = '找不到指定的文章。';
                return;
            }

            try {
                // 抓取文章與標籤
                const { data: article, error } = await supabase
                    .from('articles')
                    .select('*, article_tags(tags(name))')
                    .eq('id', articleId)
                    .single();

                if (error) throw error;
                if (article.status !== 'published') {
                    document.getElementById('loading').innerText = '此文章尚未公開。';
                    return;
                }

                // 填入資料
                document.getElementById('view-title').innerText = article.title;
                document.getElementById('view-date').innerText = `📅 ${new Date(article.created_at).toLocaleDateString('zh-TW')}`;
                document.getElementById('view-read-time').innerText = `⏱️ ${article.read_time || 1} 分鐘閱讀`;
                document.getElementById('view-views').innerText = `👁️ ${article.view_count || 0} 次觀看`;
                
                // 設定網頁的 Title 與 SEO Description
                document.title = `${article.title} - 大寶的紫微斗數`;
                if(article.meta_description) {
                    let meta = document.createElement('meta');
                    meta.name = "description";
                    meta.content = article.meta_description;
                    document.head.appendChild(meta);
                }

                // 填入標籤
                const tagsContainer = document.getElementById('view-tags');
                if (article.article_tags && article.article_tags.length > 0) {
                    article.article_tags.forEach(t => {
                        if(t.tags) {
                            const span = document.createElement('span');
                            span.className = 'bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-medium';
                            span.innerText = `#${t.tags.name}`;
                            tagsContainer.appendChild(span);
                        }
                    });
                }

                // 填入 HTML 內容
                document.getElementById('view-content').innerHTML = article.content.html || '';

                // 顯示畫面
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('article-container').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = '載入文章發生錯誤，請稍後再試。';
            }
        }

        document.addEventListener('DOMContentLoaded', loadArticle);
    </script>
</body>
</html>
