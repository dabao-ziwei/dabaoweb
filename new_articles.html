<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教學文章 - 大寶的紫微斗數</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="images/Dabao logo.jpeg" alt="Dabao Logo" class="nav-logo-icon">
                <span class="logo-text">大寶 | 紫微斗數</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">首頁</a></li>
                <li><a href="chart.html">線上排盤</a></li>
                <li><a href="booking.html">線上預約</a></li>
                <li><a href="course.html">【實戰紫微斗數】課程</a></li>
                <li><a href="articles.html" style="color:var(--accent-color);">教學文章</a></li>
            </ul>
        </div>
    </nav>

    <div class="inner-page-header">
        <h1>紫微斗數教學文章</h1>
        <p style="color:var(--accent-color); font-size:1.2rem; margin-top: 15px;">掌握命理邏輯，自己的命盤自己解</p>
    </div>

    <div class="inner-content">
        <hr class="section-divider" style="margin-bottom: 40px;">
        
        <div id="article-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-gray-400 text-center col-span-full py-10">正在載入文章...</p>
        </div>
    </div>

    <footer class="footer" style="margin-top:100px;">
        <div class="container">
            <p>© 2026 大寶 | 紫微斗數. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        const supabaseUrl = 'https://uwktzlxlduqyjyoolgrs.supabase.co';
        const supabaseKey = 'sb_publishable_zd-hddZrWPl2uzLUJmouxw_U31_3PYa';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function loadPublishedArticles() {
            const grid = document.getElementById('article-grid');
            try {
                const { data, error } = await supabaseClient
                    .from('articles')
                    .select('id, title, meta_description, created_at, read_time, view_count')
                    .eq('status', 'published')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-20" style="background:#111; border:1px solid #333; border-radius:8px;">
                            <p class="text-xl font-bold mb-2" style="color:var(--accent-color);">目前尚未發布任何文章</p>
                            <p class="text-gray-400">大寶老師正在努力撰寫中，敬請期待！</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = '';
                data.forEach(article => {
                    const dateStr = new Date(article.created_at).toLocaleDateString('zh-TW');
                    const desc = article.meta_description || '點擊閱讀完整內容...';
                    
                    const card = document.createElement('div');
                    // 融入暗黑系風格的 Tailwind 設定
                    card.className = 'bg-[#111] border border-[#333] rounded-lg overflow-hidden hover:border-[#d4af37] transition-colors duration-300 flex flex-col shadow-lg';
                    card.innerHTML = `
                        <div class="p-6 flex flex-col h-full">
                            <h3 class="text-xl font-bold mb-3 leading-snug">
                                <a href="/article_view.html?id=${article.id}" class="text-white hover:text-[#d4af37] transition-colors">${article.title}</a>
                            </h3>
                            <p class="text-gray-400 mb-6 flex-grow line-clamp-3 leading-relaxed">${desc}</p>
                            <div class="text-sm text-gray-500 flex justify-between items-center border-t border-[#333] pt-4 mt-auto">
                                <span>📅 ${dateStr}</span>
                                <span class="flex gap-3">
                                    <span>⏱️ ${article.read_time || 1} 分</span>
                                    <span>👁️ ${article.view_count || 0}</span>
                                </span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error('載入失敗:', err);
                grid.innerHTML = '<p class="text-red-500 text-center col-span-full py-10">資料載入失敗，請檢查資料庫連線或稍後再試。</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadPublishedArticles);
    </script>
</body>
</html>
